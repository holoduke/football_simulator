name: Build Linux Binary
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      
      - name: Build with static linking
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++" ..
          make -j$(nproc)
          ls -la bin/
          file bin/footballsimulator
          ldd bin/footballsimulator || true
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: footballsimulator-linux-x64
          path: build/bin/footballsimulator
